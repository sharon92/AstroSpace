worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    server {
        listen 8181;
		
		# Set the limit to 100 Megabytes (adjust as needed)
		client_max_body_size 2000M;

        # Uploaded images
        location /uploads/ {
            alias /uploads/;
            autoindex off;
            add_header Cache-Control "public, max-age=31536000";
        }

        # Flask static directory
        location /static/ {
            alias /static/;
            autoindex off;
            add_header Cache-Control "public, max-age=31536000";
        }

        # Everything else goes to Flask (Gunicorn)
        location / {
            proxy_pass http://astrospace_app:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
			
			# Increase these timeouts (default is 60s)
			proxy_connect_timeout       1000;
			proxy_send_timeout          1000;
			proxy_read_timeout          1000;
			send_timeout                1000;
        }
    }
}
